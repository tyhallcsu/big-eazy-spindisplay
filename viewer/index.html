<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>SVG Render Workflow</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
      }

      body {
        display: grid;
        place-items: center;
        position: relative;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      canvas {
        display: block;
        border-radius: 22px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      }

      body:not(.viewer-has-ui) canvas {
        border-radius: 0;
        box-shadow: none;
      }

      #viewer-ui {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 10;
        width: min(340px, calc(100vw - 32px));
        max-height: calc(100vh - 32px);
        padding: 16px;
        box-sizing: border-box;
        overflow-y: auto;
        border: 1px solid rgba(131, 209, 240, 0.18);
        border-radius: 18px;
        background: rgba(7, 12, 18, 0.82);
        backdrop-filter: blur(18px);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.24);
        color: #edf8ff;
      }

      #viewer-ui h1 {
        margin: 0 0 8px;
        font-size: 17px;
        line-height: 1.2;
      }

      #viewer-ui p {
        margin: 0;
        color: rgba(237, 248, 255, 0.72);
        font-size: 13px;
        line-height: 1.45;
      }

      .viewer-ui__grid {
        display: grid;
        gap: 14px;
        margin-top: 14px;
      }

      .viewer-ui__field {
        display: grid;
        gap: 6px;
      }

      .viewer-ui__label {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #9fcadd;
      }

      .viewer-ui__select,
      .viewer-ui__text,
      .viewer-ui__button {
        appearance: none;
        width: 100%;
        border: 1px solid rgba(145, 208, 235, 0.16);
        border-radius: 12px;
        background: rgba(12, 24, 34, 0.95);
        color: #edf8ff;
        font: inherit;
      }

      .viewer-ui__select {
        padding: 11px 12px;
      }

      .viewer-ui__text {
        padding: 11px 12px;
        box-sizing: border-box;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .viewer-ui__inline {
        display: grid;
        grid-template-columns: 60px minmax(0, 1fr);
        gap: 10px;
      }

      .viewer-ui__color {
        width: 100%;
        height: 46px;
        border: 1px solid rgba(145, 208, 235, 0.16);
        border-radius: 12px;
        background: rgba(12, 24, 34, 0.95);
        padding: 4px;
        box-sizing: border-box;
        cursor: pointer;
      }

      .viewer-ui__color::-webkit-color-swatch-wrapper {
        padding: 0;
      }

      .viewer-ui__color::-webkit-color-swatch {
        border: 0;
        border-radius: 8px;
      }

      .viewer-ui__actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .viewer-ui__button {
        padding: 11px 12px;
        cursor: pointer;
        transition: background 120ms ease, border-color 120ms ease, transform 120ms ease;
      }

      .viewer-ui__button:disabled {
        cursor: not-allowed;
        opacity: 0.72;
        background: rgba(12, 24, 34, 0.78);
        border-color: rgba(145, 208, 235, 0.12);
        transform: none;
      }

      .viewer-ui__button:hover {
        background: rgba(18, 36, 52, 0.98);
        border-color: rgba(145, 208, 235, 0.28);
        transform: translateY(-1px);
      }

      .viewer-ui__button:disabled:hover {
        background: rgba(12, 24, 34, 0.78);
        border-color: rgba(145, 208, 235, 0.12);
        transform: none;
      }

      .viewer-ui__button--primary {
        background: linear-gradient(135deg, #1e8fb7, #37c7ff);
        color: #031018;
        border-color: transparent;
        font-weight: 600;
      }

      .viewer-ui__button--primary:hover {
        background: linear-gradient(135deg, #28a0cb, #57d5ff);
      }

      .viewer-ui__button--full {
        grid-column: 1 / -1;
      }

      .viewer-ui__button--active {
        background: rgba(27, 128, 168, 0.34);
        border-color: rgba(87, 210, 255, 0.5);
      }

      .viewer-ui__button--active:hover {
        background: rgba(33, 149, 194, 0.42);
      }

      .viewer-ui__button--detail {
        display: grid;
        gap: 4px;
        text-align: left;
      }

      .viewer-ui__button-label {
        font-size: 13px;
        font-weight: 600;
        line-height: 1.2;
      }

      .viewer-ui__button-meta {
        font-size: 11px;
        line-height: 1.3;
        color: rgba(237, 248, 255, 0.68);
      }

      .viewer-ui__section {
        display: grid;
        gap: 12px;
        padding-top: 2px;
      }

      .viewer-ui__section-title,
      .viewer-ui__subsection-title {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #9fcadd;
      }

      .viewer-ui__subsection {
        display: grid;
        gap: 10px;
      }

      .viewer-ui__section-actions {
        display: grid;
        gap: 10px;
      }

      .viewer-ui__status {
        min-height: 17px;
        font-size: 12px;
        line-height: 1.4;
        color: rgba(237, 248, 255, 0.72);
      }

      .viewer-ui__status[data-tone="success"] {
        color: #9df3c5;
      }

      .viewer-ui__status[data-tone="error"] {
        color: #ffb6a9;
      }

      @media (max-width: 720px) {
        #viewer-ui {
          top: auto;
          bottom: 16px;
        }
      }
    </style>
  </head>
  <body>
    <script type="importmap">
      {
        "imports": {
          "three": "../node_modules/three/build/three.module.js",
          "three/addons/": "../node_modules/three/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
